events {
    worker_connections 1024;
}

http {
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream market_data {
        server 172.17.0.1:8001;
    }

    upstream ml_engine {
        server 172.17.0.1:8002;
    }

    upstream sentiment {
        server 172.17.0.1:8003;
    }

    upstream order_executor {
        server 172.17.0.1:8004;
    }

    upstream chatbot {
        server 172.17.0.1:8005;
    }

    upstream dashboard {
        server 172.17.0.1:33000;
    }

    server {
        listen 80;
        server_name localhost;

        location /health {
            return 200 '{"status":"ok","gateway":"nginx","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        location /api/market/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://market_data/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "market-data-collector";
        }

        location /api/ml/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://ml_engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "ml-decision-engine";
        }

        location /api/sentiment/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://sentiment/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "sentiment-collector";
        }

        location /api/trade/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://order_executor/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "order-executor";
        }

        location /api/chat/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://chatbot/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "chatbot";
        }

        location / {
            proxy_pass http://dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx-api-gateway";
        }
    }
}