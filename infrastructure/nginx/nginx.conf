events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        location /health {
            return 200 '{"status":"ok","gateway":"nginx-grpc","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        # REST → dashboard
        location / {
            proxy_pass http://172.17.0.1:33000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # gRPC servers - HTTP/2 required
    server {
        listen 9051 http2;
        location / {
            grpc_pass grpc://172.17.0.1:50051;
            add_header X-Gateway "nginx-grpc-gateway";
            add_header X-Service "market-data-collector";
        }
    }

    server {
        listen 9052 http2;
        location / {
            grpc_pass grpc://172.17.0.1:50052;
            add_header X-Gateway "nginx-grpc-gateway";
            add_header X-Service "ml-decision-engine";
        }
    }

    server {
        listen 9053 http2;
        location / {
            grpc_pass grpc://172.17.0.1:50053;
            add_header X-Gateway "nginx-grpc-gateway";
            add_header X-Service "sentiment-collector";
        }
    }

    server {
        listen 9054 http2;
        location / {
            grpc_pass grpc://172.17.0.1:50054;
            add_header X-Gateway "nginx-grpc-gateway";
            add_header X-Service "order-executor";
        }
    }

    server {
        listen 9055 http2;
        location / {
            grpc_pass grpc://172.17.0.1:50055;
            add_header X-Gateway "nginx-grpc-gateway";
            add_header X-Service "chatbot";
        }
    }
}