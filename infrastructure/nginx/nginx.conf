events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        location /health {
            return 200 '{"status":"ok","gateway":"nginx","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        location ^~ /api/market/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://172.17.0.1:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "market-data-collector";
        }

        location ^~ /api/ml/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://172.17.0.1:8002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "ml-decision-engine";
        }

        location ^~ /api/sentiment/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://172.17.0.1:8003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "sentiment-collector";
        }

        location ^~ /api/trade/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://172.17.0.1:8004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "order-executor";
        }

        location ^~ /api/chat/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://172.17.0.1:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header X-Gateway "nginx-api-gateway";
            add_header X-Service "chatbot";
        }

        location / {
            proxy_pass http://172.17.0.1:33000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header X-Gateway "nginx-api-gateway";
        }
    }
}

stream {
    server {
        listen 9051;
        proxy_pass 172.17.0.1:50051;
    }
    server {
        listen 9052;
        proxy_pass 172.17.0.1:50052;
    }
    server {
        listen 9053;
        proxy_pass 172.17.0.1:50053;
    }
    server {
        listen 9054;
        proxy_pass 172.17.0.1:50054;
    }
    server {
        listen 9055;
        proxy_pass 172.17.0.1:50055;
    }
}