events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name localhost;

        location /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","gateway":"nginx","version":"1.0.0"}';
        }

        location ^~ /api/market/ {
            proxy_pass http://172.17.0.1:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        location ^~ /api/ml/ {
            proxy_pass http://172.17.0.1:8002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location ^~ /api/sentiment/ {
            proxy_pass http://172.17.0.1:8003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location ^~ /api/trade/ {
            proxy_pass http://172.17.0.1:8004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location ^~ /api/chat/ {
            proxy_pass http://172.17.0.1:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location / {
            proxy_pass http://172.17.0.1:33000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

stream {
    server {
        listen 9051;
        proxy_pass 172.17.0.1:50051;
    }
    server {
        listen 9052;
        proxy_pass 172.17.0.1:50052;
    }
    server {
        listen 9053;
        proxy_pass 172.17.0.1:50053;
    }
    server {
        listen 9054;
        proxy_pass 172.17.0.1:50054;
    }
    server {
        listen 9055;
        proxy_pass 172.17.0.1:50055;
    }
}