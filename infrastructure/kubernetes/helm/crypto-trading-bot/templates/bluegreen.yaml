# Blue-Green deployment for ML Decision Engine
# Blue = current production version
# Green = new version being deployed
apiVersion: v1
kind: Service
metadata:
  name: ml-decision-engine-production
  namespace: {{ .Values.namespace }}
  annotations:
    deployment-strategy: blue-green
spec:
  selector:
    app: ml-decision-engine
    version: blue
  ports:
  - port: {{ .Values.ports.mlDecisionEngine }}
    targetPort: {{ .Values.ports.mlDecisionEngine }}
---
# Green deployment (new version)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-decision-engine-green
  namespace: {{ .Values.namespace }}
  labels:
    app: ml-decision-engine
    version: green
spec:
  replicas: 0
  selector:
    matchLabels:
      app: ml-decision-engine
      version: green
  template:
    metadata:
      labels:
        app: ml-decision-engine
        version: green
    spec:
      containers:
      - name: ml-decision-engine
        image: {{ .Values.images.mlDecisionEngine }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.ports.mlDecisionEngine }}
        envFrom:
        - configMapRef:
            name: app-config
# ── MARKET DATA COLLECTOR ────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: market-data-collector-production
  namespace: {{ .Values.namespace }}
  annotations:
    deployment-strategy: blue-green
spec:
  selector:
    app: market-data-collector
    version: blue
  ports:
  - port: {{ .Values.ports.marketDataCollector }}
    targetPort: {{ .Values.ports.marketDataCollector }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-collector-green
  namespace: {{ .Values.namespace }}
  labels:
    app: market-data-collector
    version: green
spec:
  replicas: 0
  selector:
    matchLabels:
      app: market-data-collector
      version: green
  template:
    metadata:
      labels:
        app: market-data-collector
        version: green
    spec:
      containers:
      - name: market-data-collector
        image: {{ .Values.images.marketDataCollector }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.ports.marketDataCollector }}
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ .Values.ports.marketDataCollector | quote }}
---
# ── ML DECISION ENGINE ───────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ml-decision-engine-production
  namespace: {{ .Values.namespace }}
  annotations:
    deployment-strategy: blue-green
spec:
  selector:
    app: ml-decision-engine
    version: blue
  ports:
  - port: {{ .Values.ports.mlDecisionEngine }}
    targetPort: {{ .Values.ports.mlDecisionEngine }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-decision-engine-green
  namespace: {{ .Values.namespace }}
  labels:
    app: ml-decision-engine
    version: green
spec:
  replicas: 0
  selector:
    matchLabels:
      app: ml-decision-engine
      version: green
  template:
    metadata:
      labels:
        app: ml-decision-engine
        version: green
    spec:
      containers:
      - name: ml-decision-engine
        image: {{ .Values.images.mlDecisionEngine }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.ports.mlDecisionEngine }}
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: {{ .Values.resources.mlDecisionEngine.requests.cpu | quote }}
            memory: {{ .Values.resources.mlDecisionEngine.requests.memory | quote }}
          limits:
            cpu: {{ .Values.resources.mlDecisionEngine.limits.cpu | quote }}
            memory: {{ .Values.resources.mlDecisionEngine.limits.memory | quote }}
---
