{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-decision-engine-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-decision-engine
  minReplicas: {{ .Values.autoscaling.mlDecisionEngine.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.mlDecisionEngine.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.mlDecisionEngine.cpuThreshold }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-executor-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-executor
  minReplicas: {{ .Values.autoscaling.orderExecutor.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.orderExecutor.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.orderExecutor.cpuThreshold }}
{{- end }}