# Market Data Collector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-collector
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount.marketDataCollector }}
  selector:
    matchLabels:
      app: market-data-collector
  template:
    metadata:
      labels:
        app: market-data-collector
    spec:
      containers:
      - name: market-data-collector
        image: {{ .Values.images.marketDataCollector }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.ports.marketDataCollector }}
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ .Values.ports.marketDataCollector | quote }}
---
# ML Decision Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-decision-engine
  namespace: {{ .Values.namespace }}
  labels:
    app: ml-decision-engine
    version: blue
spec:
  replicas: {{ .Values.replicaCount.mlDecisionEngine }}
  selector:
    matchLabels:
      app: ml-decision-engine
      version: blue
  template:
    metadata:
      labels:
        app: ml-decision-engine
        version: blue
    spec:
      containers:
      - name: ml-decision-engine
        image: {{ .Values.images.mlDecisionEngine }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.ports.mlDecisionEngine }}
        envFrom:
        - configMapRef:
            name: app-config
---
