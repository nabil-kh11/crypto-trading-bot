apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-executor
  namespace: crypto-trading-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-executor
  template:
    metadata:
      labels:
        app: order-executor
    spec:
      containers:
      - name: order-executor
        image: docker.io/library/crypto-trading-bot-order-executor:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8004
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: order-executor
  namespace: crypto-trading-bot
spec:
  selector:
    app: order-executor
  ports:
  - port: 8004
    targetPort: 8004