apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: crypto-trading-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      containers:
      - name: chatbot
        image: docker.io/library/crypto-trading-bot-chatbot:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8005
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 240
          periodSeconds: 15
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 300
          periodSeconds: 30
          failureThreshold: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot
  namespace: crypto-trading-bot
spec:
  selector:
    app: chatbot
  ports:
  - port: 8005
    targetPort: 8005