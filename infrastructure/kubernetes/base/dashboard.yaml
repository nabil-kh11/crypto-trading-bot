apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: crypto-trading-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: docker.io/library/crypto-trading-bot-dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: crypto-trading-bot
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30000