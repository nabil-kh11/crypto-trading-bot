apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: crypto-trading-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: crypto-trading-bot-dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: crypto-trading-bot
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30000