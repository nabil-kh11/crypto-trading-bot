apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crypto-trading-bot-ingress
  namespace: crypto-trading-bot
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: crypto-bot.local
    http:
      paths:
      - path: /api/market(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: market-data-collector
            port:
              number: 8001
      - path: /api/ml(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: ml-decision-engine
            port:
              number: 8002
      - path: /api/sentiment(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: sentiment-collector
            port:
              number: 8003
      - path: /api/trade(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: order-executor
            port:
              number: 8004
      - path: /api/chat(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: chatbot
            port:
              number: 8005
      - path: /(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: dashboard
            port:
              number: 3000